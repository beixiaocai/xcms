<style>
.side-menu {
  text-align: left;
}
.side-menu > li {
  display: block;
  width: 100%;
  text-align: left;
}
.side-menu > li > a {
  color: #ccd6f6;
  padding: 12px 15px;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  transition: all 0.2s ease;
  background-color: transparent;
}
.side-menu > li > a:hover {
  background-color: rgba(100, 255, 218, 0.08);
  color: #64ffda;
}
.side-menu > li.active > a {
  color: #64ffda;
}
.side-menu > li > a > i {
  margin-right: 8px;
  font-size: 16px;
}
.side-menu > li > a > span:not(.fa) {
  font-size: 13px;
}
.side-menu > li > a > span.fa {
  display: none;
}
.child_menu {
  background-color: rgba(22, 22, 42, 0.95);
  display: none;
  text-align: left;
}
.child_menu.show {
  display: block;
}
.nav.child_menu > li {
  display: block;
  text-align: left;
  padding-left: 0 !important;
}
.nav.child_menu > li > a {
  color: #8892b0;
  padding: 10px 15px 10px 50px !important;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
}
.nav.child_menu > li > a:hover {
  color: #64ffda;
  background-color: rgba(100, 255, 218, 0.08);
}
</style>

    eleSidebarMenus.innerHTML = html
    
    function toggleMenu(element, event) {
        event.preventDefault();
        event.stopPropagation();
        
        var submenu = element.nextElementSibling;
        var isSameMenu = element.classList.contains('active');
        
        if (submenu && submenu.classList.contains('child_menu')) {
            if (isSameMenu) {
                element.classList.remove('active');
                submenu.classList.remove('show');
            } else {
                element.classList.add('active');
                submenu.classList.add('show');
                
                document.querySelectorAll('.side-menu > li > a').forEach(function(el) {
                    if (el !== element) {
                        el.classList.remove('active');
                        var sibSubmenu = el.nextElementSibling;
                        if (sibSubmenu && sibSubmenu.classList.contains('child_menu')) {
                            sibSubmenu.classList.remove('show');
                        }
                    }
                });
            }
        }
    }
